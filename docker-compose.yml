services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-platform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-platform_dev}
      POSTGRES_DB: ${DB_NAME:-enterprise_agent_platform}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platform}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  go-backend:
    build:
      context: ./go-platform
      dockerfile: Dockerfile
    ports:
      - "${GO_SERVER_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-platform}
      DB_PASSWORD: ${DB_PASSWORD:-platform_dev}
      DB_NAME: ${DB_NAME:-enterprise_agent_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      FILE_STORAGE_DIR: /app/storage/files
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      AGENT_SERVICE_URL: http://agent-service:8000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GO_SERVER_MODE: ${GO_SERVER_MODE:-release}
      STRICT_DOMAIN_POLICY: ${STRICT_DOMAIN_POLICY:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    ports:
      - "${AGENT_SERVICE_PORT:-8000}:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      FILE_SERVICE_URL: http://go-backend:8080
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - go-backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
